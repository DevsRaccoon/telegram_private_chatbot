name = "telegram-private-chatbot"
main = "worker.js"
compatibility_date = "2024-11-30"

[[kv_namespaces]]
binding = "TOPIC_MAP"
id = "ba6d4460ce474e1e96a4cd0076e97450"

[vars]
SUPERGROUP_ID = "-1003889789499"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
# 注意：KV 命名空间 ID 每个用户都不一样，
# 所以不能写死在这里。用户需要在 Cloudflare 后台手动绑定。
